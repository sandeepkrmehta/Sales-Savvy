spring.application.name=com.salesSavvy

# Database Configuration - Use Environment Variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecom}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Razorpay Configuration - Use Environment Variables
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Security
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD}

# Logging Configuration
logging.level.root=INFO
logging.level.com.salesSavvy=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/sales-savvy.log
logging.file.max-size=10MB
logging.file.max-history=30

# Pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Pattern for file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false